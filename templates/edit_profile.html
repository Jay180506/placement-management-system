<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            GTU-ITR PMS
        </a>

        <div class="ms-auto">

            <a href="/profile" class="nav-btn">
                Profile
            </a>

            <a href="/dashboard" class="nav-btn">
                Dashboard
            </a>

            <a href="/logout" class="nav-btn">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-header text-center">

                    <h2>
                        ✏️ Edit Profile
                    </h2>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="phone"
                                   value="{{ student[4] }}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Department
                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="department"
                                   value="{{ student[5] }}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                CGPA
                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="cgpa"
                                   value="{{ student[6] }}"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-success w-100">
                            Update Profile
                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a href="/profile"
                           class="btn btn-secondary">
                            Back to Profile
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<footer>

    <div class="container-fluid px-5">

        <div class="row">

            <div class="col-md-6">

                <h5>Address</h5>

                <p>
                    Gujarat Technological University<br>
                    Institute of Technology and Research<br>
                    Ahmedabad, Gujarat
                </p>

            </div>

            <div class="col-md-6 text-end">

                <h5>Contact</h5>

                <p>
                    placement@gtuitr.edu.in
                </p>

                <p>
                    +91 XXXXX XXXXX
                </p>

            </div>

        </div>

        <hr>

        <div class="text-end">
            © 2026 Placement Management System
        </div>

    </div>

</footer>

</body>
</html>

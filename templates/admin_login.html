<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            GTU-ITR PMS
        </a>

        <div class="ms-auto">

            <a href="/" class="nav-btn">
                Home
            </a>

            
        </div>

    </div>

</nav>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow-lg border-0">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        🔐 Admin Login
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <input type="text"
                                   class="form-control"
                                   name="username"
                                   placeholder="Enter Username"
                                   required>

                        </div>

                        <div class="mb-3">

                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   placeholder="Enter Password"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-danger w-100">
                            Login
                        </button>

                    </form>

                    

                </div>

            </div>

        </div>

    </div>

</div>

<footer>

    <div class="container-fluid px-5">

        <div class="row">

            <div class="col-md-6">

                <h5>Address</h5>

                <p>
                    Gujarat Technological University<br>
                    Institute of Technology and Research<br>
                    Ahmedabad, Gujarat
                </p>

            </div>

            <div class="col-md-6 text-end">

                <h5>Contact</h5>

                <p>
                    placement@gtuitr.edu.in
                </p>

                <p>
                    +91 XXXXX XXXXX
                </p>

            </div>

        </div>

        <hr>

        <div class="text-end">
            © 2026 Placement Management System
        </div>

    </div>

</footer>

</body>
</html>

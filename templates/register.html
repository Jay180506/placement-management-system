<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            GTU-ITR PMS
        </a>

        <div class="ms-auto">

            <a href="/" class="nav-btn">
                Home
            </a>

            
        </div>

    </div>

</nav>


<div class="container">


<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow-lg border-0">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    Student Registration
                </h2>

                <form method="POST">

                    <div class="mb-3">
                        <input type="text"
                               class="form-control"
                               name="full_name"
                               placeholder="Full Name"
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="email"
                               class="form-control"
                               name="email"
                               placeholder="Email"
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="password"
                               class="form-control"
                               name="password"
                               placeholder="Password"
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="text"
                               class="form-control"
                               name="phone"
                               placeholder="Phone Number">
                    </div>

                    <div class="mb-3">
                        <input type="text"
                               class="form-control"
                               name="department"
                               placeholder="Department">
                    </div>

                    <div class="mb-3">
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="cgpa"
                               placeholder="CGPA">
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">
                        Register
                    </button>

                </form>

                

            </div>

        </div>

    </div>

</div>


</div>

</body>
</html>
